# Canonical edge type registry for the Neo4j graph.
# schema_check.py rejects graph writes that use unlisted types.
# To add a new type: append it here (no migration required).

edge_types:
  - name: IS_A
    direction: directed
    from: [Topic, Keyword]
    to: [Topic, Keyword]
    description: Hyponym/hypernym (e.g. अंतरात्मा IS_A आत्मा)

  - name: PART_OF
    direction: directed
    from: [Topic]
    to: [Topic]
    description: Sub-topic of another topic. Created from topic_path hierarchy.

  - name: RELATED_TO
    direction: undirected
    from: [Topic, Keyword]
    to: [Topic, Keyword]
    description: Soft association (stored as two reciprocal directed edges)

  - name: ALIAS_OF
    direction: directed
    from: [Alias]
    to: [Keyword]
    description: Synonym / variant spelling

  - name: MENTIONS_KEYWORD
    direction: directed
    from: [Topic, Table]
    to: [Keyword]
    description: Topic/Table body mentions this keyword (used to seed queries)

  - name: HAS_TOPIC
    direction: directed
    from: [Keyword]
    to: [Topic]
    description: Keyword JainKosh page yielded this topic

  - name: MENTIONS_TOPIC
    direction: directed
    from: [Gatha, GathaTeeka, GathaTeekaBhaavarth, Kalash, KalashBhaavarth, Page, Table]
    to: [Topic]
    description: Source node cites a topic (heading or extracted reference)
    # optional props: block_index (int), mention_path ("<topic_nk>/<block_index>"),
    #   source_natural_key (str — natural_key of the Mongo topic_extracts doc)

  - name: CONTAINS_DEFINITION
    direction: directed
    from: [Gatha, GathaTeeka, GathaTeekaBhaavarth, Kalash, KalashBhaavarth, Page]
    to: [Keyword]
    description: Source node appears in the definition body of this keyword
    # optional props: block_index (int), section_index (int), definition_index (int),
    #   mention_path ("<section_index>/<definition_index>/<block_index>"),
    #   source_natural_key (str — natural_key of the Mongo keyword_definitions doc)

  - name: HAS_TEEKA
    direction: directed
    from: [Shastra]
    to: [Teeka]
    description: Structural — shastra owns this teeka

  - name: HAS_PUBLICATION
    direction: directed
    from: [Teeka, Shastra]
    to: [Publication]
    description: Structural — teeka (or shastra) owns this publication

  - name: IN_SHASTRA
    direction: directed
    from: [Gatha]
    to: [Shastra]
    description: Structural membership — gatha belongs to this shastra

  - name: IN_TEEKA
    direction: directed
    from: [GathaTeeka, Kalash]
    to: [Teeka]
    description: Structural membership — node belongs to this teeka

  - name: IN_PUBLICATION
    direction: directed
    from: [GathaTeekaBhaavarth, KalashBhaavarth, Page]
    to: [Publication]
    description: Structural membership — node belongs to this publication

  - name: CONTAINS_TABLE
    direction: directed
    from: [Topic, Keyword, Gatha, GathaTeeka, GathaTeekaBhaavarth, Kalash, KalashBhaavarth, Page]
    to: [Table]
    properties: [weight, source]
    description: Parent node contains this embedded table
