version: "1.11.22"
parser_rules_version: "jainkosh.rules/1.11.22"

normalization:
  nfc: true
  strip_zwj: true
  strip_zwnj: true
  collapse_whitespace: true
  br_to_newline: true

sections:
  selector: "div.mw-parser-output"
  h2_headline_selector: "h2 span.mw-headline"
  kinds:
    - id: "а§Єа§ња§¶а•На§Іа§Ња§Ва§§а§Ха•Ла§Ј_а§Єа•З"
      kind: "siddhantkosh"
    - id: "а§™а•Ба§∞а§Ња§£а§Ха•Ла§Ј_а§Єа•З"
      kind: "puraankosh"
  default_kind: "misc"

definitions:
  siddhantkosh:
    boundary: "leading_reference_or_intro"
  puraankosh:
    boundary: "p_with_id_or_whole_block"
  numbering_strip:
    enabled: true
    leading_re: '^\s*\(\d+\)\s*'

index:
  enabled_for: ["siddhantkosh"]
  outer_list_selector: "ol"
  inner_anchor_ignore_selector: "ol li a[href^='#']"
  see_also_list_selector: "ul"
  self_link_class: "mw-selflink-fragment"
  source_chain:
    enabled: true
    li_strong_selector: "strong"
    li_strong_a_selector: "strong > a"
    skip_li_with_footer_id: true
    match_normalize: "nfc_collapsed_ws"
    enclosing_li_fallback: true
    li_path_from_inner_ol_fallback: true
    row_li_self_path_check: true
    sibling_container_fallback: true
  top_level_reference_marking: true
  anchor_dedup:
    nth_occurrence_tracking: true
  see_also_triggers:
    - "а§µа§ња§ґа•За§Ј а§¶а•За§Ца•За§В"
    - "а§¶а•За§Ца•За§В"
  see_also_window_chars: 40
  see_also_leading_punct_re: '[(вАУ\-а•§\s]*'

block_classes:
  SanskritText: "sanskrit_text"
  SanskritGatha: "sanskrit_gatha"
  PrakritText: "prakrit_text"
  PrakritGatha: "prakrit_gatha"
  HindiText: "hindi_text"
  HindiGatha: "hindi_gatha"

reference:
  selector: "span.GRef"
  strip_inner_anchors: true
  parse_strategy: "structured"
  shastra_config_path: "parser_configs/_manual_configs/shastra.json"
  devanagari_normalization:
    enabled: true
    substitutions:
      - {from: "а§£а•На§°", to: "а§Ва§°"}
      - {from: "а§£а•На§†", to: "а§Ва§†"}
      - {from: "а§Юа•На§Ъ", to: "а§Ва§Ъ"}
      - {from: "а§Юа•На§Ь", to: "а§Ва§Ь"}
      - {from: "а§®а•На§§", to: "а§Ва§§"}
      - {from: "а§®а•На§¶", to: "а§Ва§¶"}
      - {from: "а§Ѓа•На§ђ", to: "а§Ва§ђ"}
      - {from: "а§®а•На§µ", to: "а§Ва§µ"}
      - {from: "а•А", to: "а§њ"}
  mool:
    keywords: ["а§Ѓа•Ва§≤"]
    exceptions: ["а§Ѓа•Ва§≤а§Ња§Ъа§Ња§∞"]
  needs_manual_match:
    on_extra_groups: true
    on_missing_fields: true
  noise_phrases:
    enabled: true
    phrases:
      - "а§Ѓа•Ва§≤ а§Ча§Ња§•а§Њ а§ѓа§Њ а§Яа•Аа§Ха§Њ"
      - "а§Ѓа•Ва§≤ а§ѓа§Њ а§Яа•Аа§Ха§Њ"
  section_keywords:
    enabled: true
    keywords:
      - а§Ча§Ња§•а§Њ
      - а§ґа•На§≤а•Ла§Х
      - а§™а§Ва§Ха•На§§а§њ
      - а§Ха§≤а§ґ
      - а§™а§∞а§ња§ґа§ња§Ја•На§†
      - а§Еа§Іа§ња§Ха§Ња§∞
      - а§Еа§Іа•На§ѓа§Ња§ѓ
      - а§Єа§∞а•На§Ч
      - а§™а§∞а§ња§Ъа•На§Ыа•За§¶
      - а§™а•На§∞а§Ха§∞а§£
      - а§Ца§£а•На§°
      - а§≠а§Ња§Ч
      - а§™а•Ба§Єа•На§§а§Х
  raw_html:
    collapse_whitespace: true
  semicolon_split:
    enabled: true
    split_re: '(?<=\))\s*;\s*(?=\()'
  annotate_inline_position: true
  entity_keywords:
    gatha: [а§Ча§Ња§•а§Њ, а§ґа•На§≤а•Ла§Х, а§Єа•Ва§§а•На§∞, а§¶а•Ла§єа§Х, а§µа§Ња§∞а•На§§а§ња§Х]
    kalash: [а§Ха§≤а§ґ]
    page: [а§™а•Га§Ја•На§†]
    pankti: [а§™а§Ва§Ха•На§§а§њ]

ref_strip:
  enabled: true
  collapse_double_spaces: true
  collapse_orphan_parens: true
  collapse_orphan_brackets: true
  trim_trailing_chars: " а•§а••;,"

translation_marker:
  prefix: "="
  source_kinds: ["sanskrit_text", "sanskrit_gatha", "prakrit_text", "prakrit_gatha"]
  hindi_kinds: ["hindi_text", "hindi_gatha"]
  sibling_marker_enabled: true
  sibling_marker_text_node_re: '^\s*=\s*$'
  reference_ordering: "leading_then_inline"

nested_span:
  flatten: true
  outer_kinds: ["sanskrit_text", "prakrit_text", "hindi_text"]

table:
  selector: "table"
  store_raw_html: true
  extraction_strategy: "raw_html_plus_rows"
  attach_to: "current_subsection"
  fallback_when_no_subsection: "section_root"
  emit_first_class_node: true
  parse_cells: true
  parse_mentions: true
  raw_html:
    collapse_whitespace: true

redlink:
  enabled: true
  anchor_class: "new"
  title_marker_re: '^.+\(page does not exist\)\s*$'
  href_marker_substring: "redlink=1"
  prose_strip:
    enabled: true
    connector_re: '\s*[\-вАУ]\s*$'

paren_dekhen_strip:
  enabled: true
  bracket_pairs:
    - ["(", ")"]
    - ["[", "]"]
  trigger_required_inside: true
  collapse_double_punct: true

label_to_topic:
  enabled: true
  emit_for_redlink: true
  emit_for_wiki_link: true
  emit_for_self_link: true
  bullet_prefixes: ["вАҐ", "¬Ј", "*", "-"]
  label_trim_chars: " \tа•§а••"
  attach_to: "current_subsection"
  is_synthetic: true
  is_leaf: true
  source_marker: "label_seed"
  skip_in_source_kinds: ["hindi_text"]
  trim_to_clause: true
  clause_boundary_chars: "а•§а••.()[]"
  preserve_inner_quotes: true
  relocate_inline_see_also_to_child: true

navigation:
  drop: true
  prev_text: "а§™а•Ва§∞а•На§µ а§™а•Га§Ја•На§†"
  next_text: "а§Еа§Ча§≤а§Њ а§™а•Га§Ја•На§†"
  containing_tag: "p"

emphasis:
  bold_to_markdown: true
  italic_to_markdown: true

headings:
  variants:
    - name: V1
      selector: "strong[id]"
      id_from: "self.attribute(id)"
      heading_text: "self.text"
    - name: V2
      selector: "span.HindiText[id] > strong"
      id_from: "parent.attribute(id)"
      heading_text: "self.text"
    - name: V3
      selector: "li[id] > span.HindiText > strong"
      id_from: "ancestor::li[1].attribute(id)"
      heading_text: "self.text"
    - name: V4
      selector: "p.HindiText > b:only-child"
      id_from: "regex_group(self.text, 'topic_path')"
      heading_text: "regex_group(self.text, 'heading')"
      regex: '^\s*(?P<topic_path>\d+(?:\.\d+)*)[.\s]+(?P<heading>.+?)\s*$'
    - name: V5
      selector: "p.HindiText[id]"
      id_from: "self.attribute(id)"
      heading_text: "regex_group(self.text, 'heading')"
      regex: '^\s*(?P<topic_path>\d+(?:\.\d+)*)[.\s]+(?P<heading>.+?)\s*$'

slug:
  preserve_devanagari: true
  strip_chars: "а•§а••.,;:!?()[]{}'\"`-"
  whitespace_to: "-"
  collapse_dashes: true
  strip_v4_numeric_prefix: true

bullet_strip:
  prefixes: ["вАҐ", "¬Ј", "*", "-"]
  trailing_punct: ["а•§", "а••"]

envelope:
  idempotency_mode: "envelope_root"
  index_relations_as_topics:
    enabled: true
  shastra_hierarchy:
    enabled: false

reference_splitting:
  enabled: true
  applicable_block_kinds:
    - hindi_text
    - sanskrit_text
    - prakrit_text
    - hindi_gatha
    - prakrit_gatha
    - sanskrit_gatha
  gref_selector: "span.GRef"

dfs:
  passthrough_leading_gref: true
  process_v2_inline_content: true

see_also_only_block:
  enabled: true
  prose_kinds: ["hindi_text", "hindi_gatha", "prakrit_text", "prakrit_gatha", "sanskrit_text", "sanskrit_gatha"]
  match_re: '^[\sвАҐ¬Ј*\-вАУ]*[^а•§а••]*?[\-вАУ]?\s*(?:а§µа§ња§ґа•За§Ј\s+)?а§¶а•За§Ца•За§В\s+[^а•§а••]*$'
  drop_from_extra_blocks: true

neo4j:
  redlink_edges: "never"

blocks:
  preserve_see_alsos_on_empty_text: true
  is_bullet_point_for_li: true
  nested_span_gref_reattach: true
  nested_span_gref_boundary_tags: ["br"]

blocks_to_drop_when_empty:
  - "p"
  - "div"
