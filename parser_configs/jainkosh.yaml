version: "1.1.0"
parser_rules_version: "jainkosh.rules/1.2.0"

normalization:
  nfc: true
  strip_zwj: true
  strip_zwnj: true
  collapse_whitespace: true
  br_to_newline: true

sections:
  selector: "div.mw-parser-output"
  h2_headline_selector: "h2 span.mw-headline"
  kinds:
    - id: "सिद्धांतकोष_से"
      kind: "siddhantkosh"
    - id: "पुराणकोष_से"
      kind: "puraankosh"
  default_kind: "misc"

definitions:
  siddhantkosh:
    boundary: "leading_reference_or_intro"
  puraankosh:
    boundary: "p_with_id_or_whole_block"
  numbering_strip:
    enabled: true
    leading_re: '^\s*\(\d+\)\s*'

index:
  enabled_for: ["siddhantkosh"]
  outer_list_selector: "ol"
  inner_anchor_ignore_selector: "ol li a[href^='#']"
  see_also_list_selector: "ul"
  self_link_class: "mw-selflink-fragment"
  source_chain:
    enabled: true
    li_strong_selector: "strong"
    li_strong_a_selector: "strong > a"
    skip_li_with_footer_id: true
    match_normalize: "nfc_collapsed_ws"
  see_also_triggers:
    - "विशेष देखें"
    - "देखें"
  see_also_window_chars: 40
  see_also_leading_punct_re: '[(–\-।\s]*'

block_classes:
  SanskritText: "sanskrit_text"
  SanskritGatha: "sanskrit_gatha"
  PrakritText: "prakrit_text"
  PrakritGatha: "prakrit_gatha"
  HindiText: "hindi_text"
  HindiGatha: "hindi_gatha"

reference:
  selector: "span.GRef"
  strip_inner_anchors: true
  parse_strategy: "text_only"
  raw_html:
    collapse_whitespace: true

ref_strip:
  enabled: true
  collapse_double_spaces: true
  collapse_orphan_parens: true
  collapse_orphan_brackets: true
  trim_trailing_chars: " ।॥;,"

translation_marker:
  prefix: "="
  source_kinds: ["sanskrit_text", "sanskrit_gatha", "prakrit_text", "prakrit_gatha"]
  hindi_kinds: ["hindi_text", "hindi_gatha"]
  sibling_marker_enabled: true
  sibling_marker_text_node_re: '^\s*=\s*$'
  reference_ordering: "leading_then_inline"

nested_span:
  flatten: true
  outer_kinds: ["sanskrit_text", "prakrit_text", "hindi_text"]

table:
  selector: "table"
  store_raw_html: true
  extraction_strategy: "raw_html_only"
  attach_to: "current_subsection"
  fallback_when_no_subsection: "section_root"
  raw_html:
    collapse_whitespace: true

redlink:
  enabled: true
  anchor_class: "new"
  title_marker_re: '^.+\(page does not exist\)\s*$'
  href_marker_substring: "redlink=1"
  prose_strip:
    enabled: true
    connector_re: '\s*[\-–]\s*$'

paren_dekhen_strip:
  enabled: true
  bracket_pairs:
    - ["(", ")"]
    - ["[", "]"]
  trigger_required_inside: true
  collapse_double_punct: true

label_to_topic:
  enabled: true
  emit_for_redlink: true
  emit_for_wiki_link: true
  emit_for_self_link: true
  bullet_prefixes: ["•", "·", "*", "-"]
  label_trim_chars: " \t।॥"
  attach_to: "current_subsection"
  is_synthetic: true
  is_leaf: true
  source_marker: "label_seed"
  skip_in_source_kinds: ["hindi_text"]
  trim_to_clause: true
  clause_boundary_chars: "।॥.()[]"
  preserve_inner_quotes: true

navigation:
  drop: true
  prev_text: "पूर्व पृष्ठ"
  next_text: "अगला पृष्ठ"
  containing_tag: "p"

emphasis:
  bold_to_markdown: true
  italic_to_markdown: true

headings:
  variants:
    - name: V1
      selector: "strong[id]"
      id_from: "self.attribute(id)"
      heading_text: "self.text"
    - name: V2
      selector: "span.HindiText[id] > strong"
      id_from: "parent.attribute(id)"
      heading_text: "self.text"
    - name: V3
      selector: "li[id] > span.HindiText > strong"
      id_from: "ancestor::li[1].attribute(id)"
      heading_text: "self.text"
    - name: V4
      selector: "p.HindiText > b:only-child"
      id_from: "regex_group(self.text, 'topic_path')"
      heading_text: "regex_group(self.text, 'heading')"
      regex: '^\s*(?P<topic_path>\d+(?:\.\d+)*)[.\s]+(?P<heading>.+?)\s*$'

slug:
  preserve_devanagari: true
  strip_chars: "।॥.,;:!?()[]{}'\"`-"
  whitespace_to: "-"
  collapse_dashes: true
  strip_v4_numeric_prefix: true

bullet_strip:
  prefixes: ["•", "·", "*", "-"]
  trailing_punct: ["।", "॥"]

envelope:
  idempotency_mode: "envelope_root"

dfs:
  passthrough_leading_gref: true

see_also_only_block:
  enabled: true
  prose_kinds: ["hindi_text", "hindi_gatha", "prakrit_text", "prakrit_gatha", "sanskrit_text", "sanskrit_gatha"]
  match_re: '^[\s•·*\-–]*[^।॥]*?[\-–]?\s*(?:विशेष\s+)?देखें\s+[^।॥]*$'
  drop_from_extra_blocks: true

neo4j:
  redlink_edges: "never"

blocks_to_drop_when_empty:
  - "p"
  - "div"
