[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jain-kb-common"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "pydantic>=2.0",
    "motor>=3.3",
]

[tool.hatch.build.targets.wheel]
packages = ["jain_kb_common"]
